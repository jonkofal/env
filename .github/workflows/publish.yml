name: Publish Package

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Run tests
        run: npm test
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --provenance
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
